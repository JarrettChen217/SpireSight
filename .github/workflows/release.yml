name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: mypy src
      - run: pytest -q

  build-macos:
    needs: test
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "SPIRESIGHT_VERSION=$VERSION" >> "$GITHUB_ENV"
          PEP440_VERSION="${VERSION//-/.}"
          sed -i '' "s/^version = .*/version = \"$PEP440_VERSION\"/" pyproject.toml
          echo "Built version: $VERSION (pyproject: $PEP440_VERSION)"
          grep '^version' pyproject.toml

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install build dependencies
        run: pip install -e ".[dev]" pyinstaller

      - name: PyInstaller build
        run: pyinstaller --noconfirm packaging/spiresight.spec

      - name: Create DMG
        run: |
          create-dmg \
            --volname "SpireSight $SPIRESIGHT_VERSION" \
            "SpireSight-${SPIRESIGHT_VERSION}-macos-arm64.dmg" \
            "dist/SpireSight.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "*.dmg"
          if-no-files-found: error
          retention-days: 3

  build-windows:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Extract version from tag
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          "SPIRESIGHT_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $pep440 = $version -replace '-', '.'
          (Get-Content pyproject.toml) -replace '^version = .*', "version = ""$pep440""" | Set-Content pyproject.toml
          Write-Host "Built version: $version (pyproject: $pep440)"
          Select-String -Path pyproject.toml -Pattern '^version'

      - name: Install build dependencies
        run: pip install -e ".[dev]" pyinstaller

      - name: PyInstaller build
        run: pyinstaller --noconfirm packaging\spiresight.spec

      - name: Create zip
        shell: pwsh
        run: |
          $zipName = "SpireSight-$env:SPIRESIGHT_VERSION-windows-x64.zip"
          Compress-Archive -Path dist\SpireSight\* -DestinationPath $zipName
          Get-ChildItem $zipName

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: "*.zip"
          if-no-files-found: error
          retention-days: 3

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SpireSight ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-zip/*.zip
